<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compass</title>
    <script>
      (function(){try{var m=localStorage.getItem('compass-theme')||'light';var t=m;if(m==='auto'){var h=new Date().getHours();t=h>=7&&h<19?'light':'dark'}document.documentElement.setAttribute('data-theme',t)}catch(e){}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
